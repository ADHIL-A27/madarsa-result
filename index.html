if(m>=40)return"C";

function searchResult(){

let roll=document.getElementById("roll").value.toLowerCase()
let name=document.getElementById("name").value.toLowerCase()
let cls=document.getElementById("class").value

let out=""

students.forEach(s=>{

if(
(roll==""||s.roll.includes(roll)) &&
(name==""||s.name.toLowerCase().includes(name)) &&
(cls==""||s.class==cls)
){

let total=0
let count=0

let rows=""

for(let sub in s.subjects){

let m=s.subjects[sub]

total+=m
count++

rows+=`

<div class="flex justify-between items-center border-b py-2 text-sm sm:text-base">

<div class="pr-2">${sub}</div>

<div class="flex gap-2">

<span class="bg-green-600 text-white px-2 sm:px-3 py-1 rounded text-xs sm:text-sm">
${m}
</span>

<span class="bg-cyan-400 px-2 sm:px-3 py-1 rounded text-xs sm:text-sm">
${getGrade(m)}
</span>

</div>

</div>

`

}

let avg=total/count
let pass=avg>=40?"Pass":"Fail"


out+=`

<div class="bg-white shadow rounded overflow-hidden mb-4">

<div class="bg-blue-600 text-yellow-300 text-center p-3 sm:p-4 font-bold text-sm sm:text-xl leading-tight">

SUNNI MADARASA <br>
ERAMALLUOOR

<div class="text-white text-base sm:text-lg">

</div>

</div>

</div>

</div>

${rows}


<div class="flex justify-between mt-3 font-bold text-sm sm:text-base">

<span class="bg-blue-600 text-white px-2 sm:px-3 py-1 rounded">

</span>

<span class="bg-yellow-400 px-2 sm:px-3 py-1 rounded">

</span>

function getGrade(mark)
{
    if (mark >= 90) return {g:"A+", c:"bg-success text-white"};
    if (mark >= 80) return {g:"A", c:"bg-primary text-white"};
    if (mark >= 70) return {g:"B+", c:"bg-info text-dark"};
    if (mark >= 60) return {g:"B", c:"bg-warning text-dark"};
    if (mark >= 50) return {g:"C+", c:"bg-secondary text-white"};
    if (mark >= 40) return {g:"C", c:"bg-dark text-white"};
    if (mark >= 30) return {g:"D+", c:"bg-danger text-white"};
    if (mark >= 20) return {g:"D", c:"bg-danger text-white"};
    return {g:"E", c:"bg-black text-white"};
}

function searchResult() {

    let roll = document.getElementById("roll").value.toLowerCase();
    let name = document.getElementById("name").value.toLowerCase();
    let cls = document.getElementById("class").value;

    let tbody = document.getElementById("resultBody");
    let head = document.getElementById("tableHead");

    tbody.innerHTML = "";

    // reset header
    head.innerHTML = `
        <th>Roll</th>
        <th>Name</th>
        <th>Class</th>
    `;


    let headerAdded = false;


    students.forEach(s => {

        if (
            (roll === "" || s.roll.includes(roll)) &&
            (name === "" || s.name.toLowerCase().includes(name)) &&
            (cls === "" || s.class === cls)
        ) {

            let total = 0;
            let count = 0;


            // add subject header only once

            if (!headerAdded)
            {
                for (let sub in s.subjects)
                {
                    head.innerHTML += `<th>${sub}</th>`;
                }

                head.innerHTML += "<th>Total</th><th>Average</th><th>Grade</th>";

                headerAdded = true;
            }


            let row = `
                <tr>
                <td>${s.roll}</td>
                <td>${s.name}</td>
                <td>${s.class}</td>
            `;


            for (let sub in s.subjects)
            {
                let m = s.subjects[sub];

                total += m;
                count++;

                row += `<td>${m}</td>`;
            }


            let avg = total / count;

            let g = getGrade(avg);


            row += `
                <td>${total}</td>
                <td>${avg.toFixed(1)}</td>
                <td class="${g.c} fw-bold">${g.g}</td>
            `;


            row += "</tr>";

            tbody.innerHTML += row;

        }

    });

}
